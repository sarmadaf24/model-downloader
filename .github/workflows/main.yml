name: Download Whisper Model Local
on:
  workflow_dispatch:

jobs:
  download-and-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Download Model
        run: |
          mkdir -p local_model
          # دانلود مدل large-v2 مخصوص whisperx (CTranslate2 format)
          huggingface-cli download Systran/faster-whisper-large-v2 --local-dir local_model --exclude "*.md" ".gitattributes"

      - name: Split large bin file
        run: |
          cd local_model
          # فایل model.bin حدود 3 گیگابایت است. آن را به قطعات 90 مگابایتی تقسیم می‌کنیم
          if [ -f "model.bin" ]; then
            split -b 90M model.bin model_part_
            # حذف فایل اصلی برای جلوگیری از خطای حجم گیت‌هاب
            rm model.bin
          fi

      - name: Commit and Push to Repo
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add local_model/
          git commit -m "Add Whisper large-v2 model chunks" || echo "No changes to commit"
          # ارسال فایل‌ها به ریپازیتوری
          git push origin HEAD:main || true

      - name: Create Tag for Source Code ZIP
        run: |
          TAG_NAME="model-large-v2-$(date +%s)"
          git tag $TAG_NAME
          git push origin $TAG_NAME
