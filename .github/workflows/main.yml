name: Download Arabic Align Model Local
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-and-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Download Model
        run: |
          mkdir -p align_model
          python -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id='jonatasgrosman/wav2vec2-large-xlsr-53-arabic', local_dir='align_model', ignore_patterns=['*.md', '.gitattributes', '*.msgpack', '*.h5', '*.ot'])"

      - name: Split large bin file
        run: |
          cd align_model
          
          # تکه‌تکه کردن فایل pytorch_model.bin
          if [ -f "pytorch_model.bin" ]; then
            split -b 90M pytorch_model.bin align_part_
            rm pytorch_model.bin
          fi
          
          # تکه‌تکه کردن فایل safetensors (در صورتی که مخزن از این فرمت استفاده کرده باشد)
          if [ -f "model.safetensors" ]; then
            split -b 90M model.safetensors align_part_
            rm model.safetensors
          fi

      - name: Commit and push model chunks incrementally
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # افزایش بافر گیت برای جلوگیری از قطعی
          git config http.postBuffer 524288000
          
          echo "Starting incremental push..."
          
          # فایل‌های متنی و پیکربندی را اول کامیت و پوش می‌کنیم
          git add align_model/*.json || true
          git commit -m "Add config files" || true
          git push origin main || true
          
          # حالا پارت‌های مدل را یکی یکی کامیت و پوش می‌کنیم
          for file in align_model/align_part_*; do
            if [ -e "$file" ]; then
              echo "Pushing $file..."
              git add "$file"
              git commit -m "Add $file"
              git push origin main
            fi
          done
          
          # در نهایت تگ را می‌سازیم
          git tag align-model-v1
          git push origin align-model-v1
