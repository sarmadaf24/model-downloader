name: Put Wheels inside Source Code (Resumable)
on: workflow_dispatch

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git config --global http.postBuffer 524288000

      - name: Download Wheels
        run: |
          echo "Downloading torch..."
          wget -O torch.whl "https://download.pytorch.org/whl/cu121/torch-2.8.0%2Bcu121-cp310-cp310-win_amd64.whl"
          echo "Downloading torchvision..."
          wget -O torchvision.whl "https://download.pytorch.org/whl/cu121/torchvision-0.23.0%2Bcu121-cp310-cp310-win_amd64.whl"
          echo "Downloading torchaudio..."
          wget -O torchaudio.whl "https://download.pytorch.org/whl/cu121/torchaudio-2.8.0%2Bcu121-cp310-cp310-win_amd64.whl"

      - name: Split and Push (Resumable)
        run: |
          mkdir -p temp_chunks
          mkdir -p pytorch_files
          
          echo "Splitting files..."
          split -b 90M torch.whl temp_chunks/torch_part_
          mv torchvision.whl temp_chunks/
          mv torchaudio.whl temp_chunks/
          rm torch.whl
          
          # بررسی قطعات و آپلود فقط در صورت عدم وجود
          for file in temp_chunks/*; do
            filename=$(basename "$file")
            if [ -f "pytorch_files/$filename" ]; then
              echo "🟢 $filename already exists in repository. Skipping..."
            else
              echo "🟡 Uploading $filename..."
              cp "$file" "pytorch_files/$filename"
              git add "pytorch_files/$filename"
              git commit -m "Add chunk $filename"
              git push origin main
            fi
          done

      - name: Create Tag for Source Code Zip
        run: |
          TAG="v$(date +%s)"
          git tag $TAG
          git push origin $TAG

