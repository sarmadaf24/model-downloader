name: Build Full Quranic Text & Font Data Pack

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-data-pack:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Configure Git
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action-bot@github.com"

      - name: 3. Create Directories
        run: mkdir -p raw_data/texts_repo raw_data/translations_repo raw_data/fonts data/texts/individual data/texts/combined data/translations/individual data/translations/combined data/word-by-word fonts

      - name: 4. Clone Tanzil Texts
        run: git clone --depth 1 https://github.com/tanzil/quran-text.git raw_data/texts_repo

      - name: 5. Clone Tanzil Translations
        run: git clone --depth 1 https://github.com/tanzil/quran-translation.git raw_data/translations_repo

      - name: 6. Download Word-by-Word Data
        run: wget -v -O raw_data/quranic-corpus-morphology-0.4.txt https://corpus.quran.com/download/quranic-corpus-morphology-0.4.txt || echo "Word-by-word download failed"

      - name: 7. Download Fonts
        run: |
          wget -v -O raw_data/fonts/NotoNaskhArabic-Regular.ttf https://github.com/googlefonts/noto-fonts/raw/main/hinted/ttf/NotoNaskhArabic/NotoNaskhArabic-Regular.ttf
          wget -v -O raw_data/fonts/Amiri.zip https://github.com/alif-type/amiri/releases/download/1.000/Amiri-1.000.zip
          wget -v -O raw_data/fonts/uthman-taha.zip https://github.com/makkuk/KFGQPC-Uthman-Taha-Naskh/archive/refs/heads/main.zip

      - name: 8. Process Data and Convert to JSON
        run: |
          # اسکریپت پایتون برای تبدیل فرمت
          cat <<'EOF' > tanzil_to_json.py
          import sys, json, os
          def convert_to_json(input_file, output_file):
              if not os.path.exists(input_file): return
              data = []
              with open(input_file, 'r', encoding='utf-8') as f:
                  for line in f:
                      if line.strip().startswith('#') or not line.strip(): continue
                      parts = line.strip().split('|')
                      if len(parts) >= 3:
                          try:
                              data.append({'sura': int(parts[0]), 'ayah': int(parts[1]), 'text': '|'.join(parts[2:])})
                          except: continue
              with open(output_file, 'w', encoding='utf-8') as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)
          if __name__ == "__main__": convert_to_json(sys.argv[1], sys.argv[2])
          EOF

          # اسکریپت ترکیب فایل‌ها
          cat <<'EOF' > combine_json.py
          import sys, json, os
          def combine_files(input_dir, output_file):
              combined_data = {}
              for filename in sorted(os.listdir(input_dir)):
                  if filename.endswith(".json"):
                      key = os.path.splitext(filename)[0]
                      with open(os.path.join(input_dir, filename), 'r', encoding='utf-8') as f:
                          combined_data[key] = json.load(f)
              with open(output_file, 'w', encoding='utf-8') as f:
                  json.dump(combined_data, f, ensure_ascii=False, indent=2)
          if __name__ == "__main__": combine_files(sys.argv[1], sys.argv[2])
          EOF

          # پردازش متون
          for file in raw_data/texts_repo/*.txt; do
            python tanzil_to_json.py "$file" "data/texts/individual/$(basename "$file" .txt).json"
          done
          python combine_json.py data/texts/individual data/texts/combined/texts-all.json

          # پردازش ترجمه‌ها
          for file in raw_data/translations_repo/*.txt; do
            python tanzil_to_json.py "$file" "data/translations/individual/$(basename "$file" .txt).json"
          done
          python combine_json.py data/translations/individual data/translations/combined/translations-all.json

          # پردازش Word-by-Word
          python tanzil_to_json.py raw_data/quranic-corpus-morphology-0.4.txt data/word-by-word/quran-corpus.json

          # استخراج فونت‌ها
          unzip -o "raw_data/fonts/*.zip" -d fonts/ || true
          cp raw_data/fonts/*.ttf fonts/ || true
          find fonts -name "*.ttf" -exec mv {}
