name: Build, Split and Push Databases

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Tafsir Builder
        run: python builder_tafsir.py

      - name: Run Corpus Builder
        run: python builder_corpus.py
        continue-on-error: true  # <--- فقط این یک خط را اضافه کنید

      - name: Split Large ZIP files into 90MB chunks
        run: |
          # ایجاد پوشه برای فایل‌های تکه‌تکه شده
          mkdir -p db_chunks
          
          # تکه‌تکه کردن فایل تفسیر به قطعات 90 مگابایتی (برای عبور از محدودیت 100 مگابایت گیت‌هاب)
          if [ -f quran_tafsir_db.zip ]; then
            split -b 90M quran_tafsir_db.zip db_chunks/tafsir_part_
            rm quran_tafsir_db.zip # حذف فایل اصلی بسیار مهم است تا گیت خطای حجم ندهد
          fi
          
          # تکه‌تکه کردن فایل کورپوس
          if [ -f quran_corpus_db.zip ]; then
            split -b 90M quran_corpus_db.zip db_chunks/corpus_part_
            rm quran_corpus_db.zip
          fi

      - name: Commit and Push chunks to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # اضافه کردن پوشه حاوی قطعات به گیت
          git add db_chunks/
          
          git commit -m "Add split database chunks to source code"
          git push
