name: Put Wheels inside Source Code (Resumable)
on: workflow_dispatch

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git config --global http.postBuffer 524288000

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download Wheels using PIP
        run: |
          python -m pip install --upgrade pip
          echo "Downloading correct wheels automatically..."
          pip download --index-url https://download.pytorch.org/whl/cu121 torch==2.5.1 torchvision==0.20.1 torchaudio==2.5.1 --platform win_amd64 --python-version 3.10 --only-binary=:all: --no-deps

      - name: Split and Push (Resumable)
        run: |
          mkdir -p temp_chunks
          mkdir -p pytorch_files
          
          echo "Splitting files..."
          TORCH_WHL=$(ls torch-2*.whl | head -n 1)
          split -b 90M "$TORCH_WHL" temp_chunks/torch_part_
          
          mv torchvision*.whl temp_chunks/ || true
          mv torchaudio*.whl temp_chunks/ || true
          rm "$TORCH_WHL"
          
          for file in temp_chunks/*; do
            filename=$(basename "$file")
            if [ -f "pytorch_files/$filename" ]; then
              echo "🟢 $filename already exists. Skipping..."
            else
              echo "🟡 Uploading $filename..."
              cp "$file" "pytorch_files/$filename"
              git add "pytorch_files/$filename"
              # جلوگیری از توقف در صورت نبود تغییرات
              git commit -m "Add chunk $filename" || echo "Nothing to commit"
              # استفاده از HEAD به جای main تا روی هر برنچی کار کند
              git push origin HEAD || echo "Push failed, moving to next"
            fi
          done


      - name: Create Tag for Source Code Zip
        run: |
          TAG="v$(date +%s)"
          git tag $TAG
          git push origin $TAG
