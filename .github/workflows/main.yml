name: Build Tafsir and Corpus Databases

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # اجرای اسکریپت تفسیر (فایل زیپ ساخته می‌شود ولی پوش نمی‌شود)
      - name: Run Tafsir Builder
        run: python builder_tafsir.py

      # آپلود مستقیم فایل‌های زیپ در بخش Release
      - name: Create Release and Upload Zips
        uses: softprops/action-gh-release@v1
        with:
          tag_name: final-db-${{ github.run_number }}
          name: Quran Tafsir & Corpus Databases
          files: |
            quran_tafsir_db.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
