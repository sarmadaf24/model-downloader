# File: .github/workflows/main.yml

name: Quran Qortoba Data Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Run Qortoba XML Tafsir Builder
        id: builder
        run: python builder_qortoba.py

      - name: List files to check for output
        run: ls -lh

      - name: Split Large Qortoba ZIP file into 90MB chunks
        run: |
          set -e
          file="qortoba_tafsirs_db.zip"
          if [ -f "$file" ]; then
            # Ensure the file is not empty or too small before splitting
            if [ $(stat -c%s "$file") -gt 1024 ]; then
              echo "Splitting $file..."
              split -b 90M "$file" "${file}.part"
              rm "$file" # Remove original large file to save space
            else
              echo "Warning: $file is too small, skipping split. It will be committed as is."
            fi
          else
            echo "Error: $file not found. The builder script might have failed."
            exit 1 # Exit with an error to fail the job
          fi

      - name: List files after processing
        run: ls -lh

      - name: Commit and Push to repository
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git pull
          
          # Add the split parts if they exist
          git add qortoba_tafsirs_db.zip.part* || echo "No split parts for Qortoba tafsir to add."
          
          # Add the original zip if it wasn't split (was too small)
          git add qortoba_tafsirs_db.zip || echo "No small zip file for Qortoba tafsir to add."

          # Check if there are any changes to commit
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-update Qortoba tafsir data package"
            git push
          else
            echo "No changes to commit."
          fi
