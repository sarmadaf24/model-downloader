name: Download Whisper Model Local
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-and-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Download Model
        run: |
          mkdir -p local_model
          python -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id='Systran/faster-whisper-large-v2', local_dir='local_model', ignore_patterns=['*.md', '.gitattributes'])"

      - name: Split large bin file
        run: |
          cd local_model
          if [ -f "model.bin" ]; then
            split -b 90M model.bin model_part_
            rm model.bin
          fi

      - name: Commit and push model chunks incrementally
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # افزایش بافر گیت برای جلوگیری از قطعی
          git config http.postBuffer 524288000
          
          echo "Starting incremental push..."
          
          # فایل‌های متنی و سبک را اول کامیت و پوش می‌کنیم
          git add local_model/config.json local_model/tokenizer.json local_model/vocabulary.txt || true
          git commit -m "Add config files" || true
          git push origin main || true
          
          # حالا پارت‌های مدل را یکی یکی کامیت و پوش می‌کنیم
          for file in local_model/model_part_*; do
            echo "Pushing $file..."
            git add "$file"
            git commit -m "Add $file"
            git push origin main
          done
          
          # در نهایت تگ را می‌سازیم تا Source code (zip) برای شما آماده شود
          git tag model-v1
          git push origin model-v1

