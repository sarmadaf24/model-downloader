name: Download Faster Whisper Turbo Model

on:
  workflow_dispatch:  # با این کار خودت دستی اجراش می‌کنی

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install huggingface-hub
        run: pip install huggingface-hub

      - name: Download faster-whisper-large-v3-turbo model
        run: |
          python -c "
          from huggingface_hub import snapshot_download
          
          # دانلود کل مدل
          snapshot_download(
              repo_id='SYSTRAN/faster-whisper-large-v3-turbo',
              local_dir='./faster-whisper-turbo-model',
              local_dir_use_symlinks=False,
              ignore_patterns=['*.h5', '*.ot', '*.msgpack']  # رد کردن فایل‌های اضافی
          )
          print('✅ Model downloaded successfully!')
          "

      - name: Compress model
        run: |
          # فقط فایل model.bin رو زیپ می‌کنیم (همون چیزی که واقعاً نیاز داری)
          cd ./faster-whisper-turbo-model
          zip -r ../faster-whisper-turbo-model.zip model.bin
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: faster-whisper-turbo-model
          path: faster-whisper-turbo-model.zip
          retention-days: 7
