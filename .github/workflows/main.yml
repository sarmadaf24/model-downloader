name: Build Quran Database (Phase 1)

on:
  workflow_dispatch: # امکان اجرای دستی اکشن

permissions:
  contents: write    # دسترسی لازم برای کامیت و ساخت Release/Tag

jobs:
  build-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Builder Script
        run: python builder.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ fonts/
          # اگر تغییری نباشد ارور نمی‌دهد
          git commit -m "Add Quran texts, translations, and fonts [Phase 1]" || echo "No changes to commit"
          git push

      - name: Create Tag and Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: db-v1
          name: "Quran Database Phase 1"
          body: "دیتابیس متنی قرآن، ترجمه‌ها و فونت‌ها در ساختار پوشه‌بندی استاندارد."
