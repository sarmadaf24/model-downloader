name: Build Tafsir and Corpus Databases

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # تنظیمات گیت (الزامی برای کامیت و پوش)
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # اجرای اسکریپت تفسیر و پوش کردن بلافاصله
      - name: Run Tafsir Builder
        run: python builder_tafsir.py

      - name: Commit and Push Tafsir
        run: |
          # اگر اسکریپت شما فایل زیپ می‌سازد، فایل زیپ را اد کنید
          git add quran_tafsir_db.zip 
          git commit -m "Add Tafsir data" || echo "No changes"
          git push

      # اجرای اسکریپت کورپوس و پوش کردن بلافاصله
      - name: Run Corpus Builder
        run: python builder_corpus.py

      - name: Commit and Push Corpus
        run: |
          # اگر اسکریپت شما فایل زیپ می‌سازد، فایل زیپ را اد کنید
          git add quran_corpus_db.zip
          git commit -m "Add Corpus data" || echo "No changes"
          git push

      # ساخت Release نهایی (اختیاری، چون فایل‌ها پوش شده‌اند)
      - name: Create Release and Upload Zips
        uses: softprops/action-gh-release@v1
        with:
          tag_name: final-db-v1
          name: Quran Tafsir & Corpus Databases
          files: |
            quran_tafsir_db.zip
            quran_corpus_db.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
