name: Download Whisper Model

on:
  workflow_dispatch:  # با این کار میتونی خودت دستی اجراش کنی
    inputs:
      model_size:
        description: 'Model size (tiny/base/small/medium/large-v3-turbo)'
        required: true
        default: 'base'
        type: choice
        options:
          - tiny
          - base
          - small
          - medium
          - large-v3-turbo

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install huggingface_hub

      - name: Download model from Hugging Face
        run: |
          python -c "
          import os
          from huggingface_hub import snapshot_download
          
          model_id = f'Systran/faster-whisper-${{ github.event.inputs.model_size }}'
          print(f'Downloading {model_id}...')
          
          snapshot_download(
              repo_id=model_id,
              local_dir=f'./model_${{ github.event.inputs.model_size }}',
              local_dir_use_symlinks=False
          )
          print('Download complete!')
          "

      - name: Compress model
        run: |
          zip -r "faster-whisper-${{ github.event.inputs.model_size }}.zip" "./model_${{ github.event.inputs.model_size }}/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: faster-whisper-${{ github.event.inputs.model_size }}
          path: "faster-whisper-${{ github.event.inputs.model_size }}.zip"
          retention-days: 7
