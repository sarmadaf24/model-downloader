name: Build Quranic Data Pack (Texts, Translations, Fonts)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-data-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Setup Environment and Create Directories
        run: |
          sudo apt-get update && sudo apt-get install -y wget unzip
          mkdir -p data/texts/individual data/texts/combined \
                   data/translations/individual data/translations/combined \
                   data/word-by-word data/transliterations fonts

      - name: Create Python Processing Scripts
        run: |
          # Script 1: Converts Tanzil text files (like quran-uthmani.txt) to JSON
          cat <<'EOF' > tanzil_to_json.py
          import sys
          import json

          def convert_to_json(input_file, output_file):
              data = []
              with open(input_file, 'r', encoding='utf-8') as f:
                  for line in f:
                      if line.strip().startswith('#') or not line.strip():
                          continue
                      parts = line.strip().split('|')
                      if len(parts) >= 3:
                          try:
                            sura = int(parts[0])
                            ayah = int(parts[1])
                            text = '|'.join(parts[2:])
                            data.append({'sura': sura, 'ayah': ayah, 'text': text})
                          except ValueError:
                            print(f"Skipping malformed line: {line.strip()}")
              
              with open(output_file, 'w', encoding='utf-8') as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)

          if __name__ == "__main__":
              convert_to_json(sys.argv[1], sys.argv[2])
          EOF

          # Script 2: Converts Quran Corpus data to structured JSON
          cat <<'EOF' > corpus_to_json.py
          import sys
          import json

          def convert_corpus_to_json(input_file, output_file):
              data = {}
              with open(input_file, 'r', encoding='utf-8') as f:
                  for line in f:
                      if line.strip().startswith('('):
                          parts = line.strip().split('\t')
                          location = parts[0][1:-1].split(':')
                          sura, ayah, word, segment = map(int, location)
                          features = parts[1:]
                          
                          if sura not in data:
                              data[sura] = {}
                          if ayah not in data[sura]:
                              data[sura][ayah] = {}
                          if word not in data[sura][ayah]:
                              data[sura][ayah][word] = []
                          
                          data[sura][ayah][word].append({
                              'segment': segment,
                              'features': features
                          })
              
              with open(output_file, 'w', encoding='utf-8') as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)

          if __name__ == "__main__":
              convert_corpus_to_json(sys.argv[1], sys.argv[2])
          EOF
          
          # Script 3: Combines individual JSON files into a single master JSON
          cat <<'EOF' > combine_json.py
          import sys
          import json
          import os

          def combine_files(input_dir, output_file):
              combined_data = {}
              for filename in os.listdir(input_dir):
                  if filename.endswith(".json"):
                      key = os.path.splitext(filename)[0]
                      filepath = os.path.join(input_dir, filename)
                      with open(filepath, 'r', encoding='utf-8') as f:
                          combined_data[key] = json.load(f)
              
              with open(output_file, 'w', encoding='utf-8') as f:
                  json.dump(combined_data, f, ensure_ascii=False, indent=2)
          
          if __name__ == "__main__":
              combine_files(sys.argv[1], sys.argv[2])
          EOF

      - name: Fetch and Process All Data
        run: |
          # --- 1. Quran Texts ---
          echo "Processing Quran texts..."
          TEXT_TYPES="quran-uthmani quran-uthmani-min quran-simple quran-simple-clean quran-indopak"
          for type in $TEXT_TYPES; do
            wget -q http://tanzil.net/res/text/plain/${type}.txt -O ${type}.txt
            python tanzil_to_json.py ${type}.txt data/texts/individual/${type}.json
            rm ${type}.txt
          done
          python combine_json.py data/texts/individual data/texts/combined/texts-all.json

          # --- 2. Translations (Add more as needed) ---
          echo "Processing translations..."
          # This is a sample list. The full list from Tanzil.net is very long.
          TRANS_CODES="en.sahih en.pickthall fa.fooladvand fa.makarem ur.jalandhry tr.yildirim"
          for code in $TRANS_CODES; do
            wget -q http://tanzil.net/trans/plain/${code}.txt -O ${code}.txt
            python tanzil_to_json.py ${code}.txt data/translations/individual/${code}.json
            rm ${code}.txt
          done
          python combine_json.py data/translations/individual data/translations/combined/translations-all.json

          # --- 3. Word-by-Word (Quranic Corpus) ---
          echo "Processing Quranic Corpus data..."
          wget -q http://tanzil.net/res/text/corpus/quranic-corpus-morphology-0.4.txt -O corpus.txt
          python corpus_to_json.py corpus.txt data/word-by-word/quran-corpus.json
          rm corpus.txt

          # --- 4. Transliteration ---
          echo "Processing Transliteration..."
          wget -q http://tanzil.net/res/text/trans/en.transliteration.buckwalter.txt -O trans.txt
          python tanzil_to_json.py trans.txt data/transliterations/en.transliteration.json
          rm trans.txt

          # --- 5. Fonts ---
          echo "Downloading fonts..."
          wget -q https://fonts.qurancomplex.gov.sa/wp-content/uploads/2021/08/KFGQPC-Uthman-Taha-Naskh-Regular.zip -O font1.zip
          unzip -o font1.zip -d fonts/ && rm font1.zip
          wget -q https://github.com/alif-type/amiri/releases/download/1.000/Amiri-1.000.zip -O font2.zip
          unzip -o font2.zip -d fonts/ && rm font2.zip

      - name: Commit and Push to Repository
        run: |
          git add data/ fonts/
          if ! git diff-index --quiet HEAD; then
            git commit -m "Update: Build Quranic data pack [$(date)]"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Create Tag for Source Code Zip Download
        run: |
          TAG="data-pack-$(date +%Y%m%d-%H%M%S)"
          git tag $TAG
          git push origin $TAG
          echo "Successfully created tag ${TAG}. The source code zip is now available."
