name: Quran Data Builder CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # --- START: NEW STEP TO RUN QORTOBA BUILDER ---
      - name: Run Qortoba XML Tafsir Builder
        run: python builder_qortoba.py

        continue-on-error: true

      - name: List files before splitting
        run: ls -lh

      - name: Split Large ZIP files into 90MB chunks
        run: |
          set -e
          # --- START: ADDED NEW FILE TO THE LOOP ---
          for file in quran_tafsir_db.zip qortoba_tafsirs_db.zip; do
          # --- END: MODIFICATION ---
            if [ -f "$file" ]; then
              echo "Splitting $file..."
              split -b 90M "$file" "${file}.part"
              rm "$file" # Remove original large file
            else
              echo "Warning: $file not found, skipping split."
            fi
          done

      - name: List files after splitting
        run: ls -lh

      - name: Commit and Push to repository
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git pull
          
          # --- START: ADDED NEW FILES TO GIT ---
          git add quran_tafsir_db.zip.part* || echo "No quran.com tafsir parts to add"
          git add qortoba_tafsirs_db.zip.part* || echo "No qortoba tafsir parts to add"
          # --- END: MODIFICATION ---
          
          git add quranic_corpus.zip || echo "No corpus file to add"
          
          # Check if there are any changes to commit
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-update Quran data packages"
            git push
          else
            echo "No changes to commit."
          fi
