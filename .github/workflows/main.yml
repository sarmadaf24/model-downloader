name: Download Whisper Model Local
on:
  workflow_dispatch:

jobs:
  download-and-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Download Model
        run: |
          mkdir -p local_model
          python -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id='Systran/faster-whisper-large-v2', local_dir='local_model', ignore_patterns=['*.md', '.gitattributes'])"

      - name: Split large bin file
        run: |
          cd local_model
          if [ -f "model.bin" ]; then
            split -b 90M model.bin model_part_
            rm model.bin
          fi

      - name: Commit and Push to Repo
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add local_model/
          git commit -m "Add Whisper large-v2 model chunks" || echo "No changes to commit"
          git push origin HEAD:main || true

      - name: Create Tag for Source Code ZIP
        run: |
          TAG_NAME="model-large-v2-$(date +%s)"
          git tag $TAG_NAME
          git push origin $TAG_NAME
