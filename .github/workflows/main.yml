# .github/workflows/fetch-tafsirs.yml

name: Fetch Quran Tafsirs

# این اکشن به صورت دستی اجرا می‌شود
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # مرحله ۱: یک فولدر برای جمع‌آوری تفاسیر ایجاد می‌کنیم
      - name: Create directory for tafsirs
        run: mkdir ./collected-tafsirs

      # مرحله ۲: مخزن اصلی داده‌های قرآن را دانلود می‌کنیم
      - name: Checkout quran.com-data repository
        uses: actions/checkout@v4
        with:
          repository: 'quran/quran.com-data'
          path: 'quran-data' # در این فولدر دانلود شود

      # مرحله ۳: فولدرهای تفاسیر مورد نظر را در فولدر جمع‌آوری کپی می‌کنیم
      # شما می‌توانید هر تعداد تفسیری که می‌خواهید را در اینجا اضافه کنید
      - name: Copy Tafsir folders
        run: |
          echo "Copying Tafsir Jalalayn..."
          cp -r quran-data/data/tafsirs/ar/ar-tafsir-jalalayn ./collected-tafsirs/
          
          echo "Copying Tafsir Al-Muyassar..."
          cp -r quran-data/data/tafsirs/ar/ar-tafsir-al-muyassar ./collected-tafsirs/
          
          echo "Copying Tafsir Ibn Kathir (English)..."
          cp -r quran-data/data/tafsirs/en/en-tafsir-ibn-kathir ./collected-tafsirs/

      # مرحله ۴: تمام فایل‌های جمع‌آوری شده را در یک فایل zip قرار می‌دهیم
      - name: Zip the collected tafsirs
        run: zip -r tafsirs-archive.zip ./collected-tafsirs

      # مرحله ۵: فایل zip نهایی را به عنوان آرتیفکت آپلود می‌کنیم تا قابل دانلود باشد
      - name: Upload Tafsir Archive as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quran-tafsirs-db
          path: tafsirs-archive.zip
